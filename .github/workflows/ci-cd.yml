name: Build, Test & Deploy

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual redeploy — rebuilds and redeploys even without a new commit,
  # e.g. after rotating the CONFIG_TOML secret.
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/alice-llm-bridge

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:ci@localhost:5432/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  docker:
    name: Build, Scan & Push Docker image
    needs: test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      attestations: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image (load locally, no push yet)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/app/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (gate before publishing)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          timeout: 10m

      - name: Push scanned image
        id: push
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: [docker]
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # config.toml holds family profiles and the account allowlist; it's
      # gitignored on purpose, so it can't come from the checkout. It lives
      # only as this secret and on the server itself.
      - name: Write config.toml from secret
        env:
          CONFIG_TOML: ${{ secrets.CONFIG_TOML }}
        run: printf '%s\n' "$CONFIG_TOML" > config.toml

      - name: Upload compose.yaml and config.toml
        run: |
          scp -o StrictHostKeyChecking=yes -i ~/.ssh/deploy_key \
            compose.yaml root@${{ secrets.SSH_HOST }}:/opt/alice-llm-bridge/compose.yaml.next
          scp -o StrictHostKeyChecking=yes -i ~/.ssh/deploy_key \
            config.toml root@${{ secrets.SSH_HOST }}:/opt/alice-llm-bridge/config.toml.next

      # Everything that touches the live compose.yaml / config.toml / .env
      # runs under one flock on the server, on the same lock file the manual
      # break-glass script (Desktop/deploy-alice.sh) uses — whichever deploy
      # starts second just waits, instead of the two racing on the same
      # files.
      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=yes -i ~/.ssh/deploy_key \
            root@${{ secrets.SSH_HOST }} << 'REMOTE'
            set -e
            cd /opt/alice-llm-bridge

            exec 200>.deploy.lock
            if ! flock -w 300 200; then
              echo "Another deploy is holding the lock after 300s — aborting."
              exit 1
            fi

            docker compose --env-file .env --env-file docker/postgres/.env \
              -f compose.yaml.next config > /dev/null
            cp compose.yaml "compose.yaml.bak-$(date +%Y%m%d%H%M%S)" 2>/dev/null || true
            mv compose.yaml.next compose.yaml
            ls -1t compose.yaml.bak-* 2>/dev/null | tail -n +6 | xargs -r rm --

            cp config.toml "config.toml.bak-$(date +%Y%m%d%H%M%S)" 2>/dev/null || true
            mv config.toml.next config.toml
            chown 1000:1000 config.toml
            chmod 400 config.toml
            ls -1t config.toml.bak-* 2>/dev/null | tail -n +6 | xargs -r rm --

            OLD_IMAGE=$(grep -E '^ALICE_IMAGE=' .env 2>/dev/null | cut -d= -f2- || true)
            NEW_IMAGE="ghcr.io/eluceon/alice-llm-bridge@${{ needs.docker.outputs.digest }}"
            grep -v '^ALICE_IMAGE=' .env > .env.next 2>/dev/null || true
            echo "ALICE_IMAGE=$NEW_IMAGE" >> .env.next
            mv .env.next .env

            COMPOSE="docker compose --env-file .env --env-file docker/postgres/.env"

            $COMPOSE pull app
            # --force-recreate: config.toml is a bind mount, so a content-only
            # change doesn't trip Compose's own change detection — without
            # this flag the app container can keep running on stale config.
            $COMPOSE up -d --remove-orphans --no-deps --force-recreate app

            sleep 10
            $COMPOSE logs app --tail 80

            HEALTHY=false
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8090/health; then
                HEALTHY=true
                break
              fi
              sleep 5
            done

            if [ "$HEALTHY" = false ]; then
              echo "Health check failed, rolling back"
              $COMPOSE logs app --tail 100

              LATEST_CONFIG_BAK=$(ls -1t config.toml.bak-* 2>/dev/null | head -n1 || true)
              if [ -n "$LATEST_CONFIG_BAK" ]; then
                cp "$LATEST_CONFIG_BAK" config.toml
                chown 1000:1000 config.toml
                chmod 400 config.toml
              fi

              if [ -n "$OLD_IMAGE" ]; then
                grep -v '^ALICE_IMAGE=' .env > .env.next 2>/dev/null || true
                echo "ALICE_IMAGE=$OLD_IMAGE" >> .env.next
                mv .env.next .env
                $COMPOSE up -d --remove-orphans --no-deps --force-recreate app
              fi
              exit 1
            fi

            $COMPOSE ps

            docker images 'ghcr.io/eluceon/alice-llm-bridge' --format '{{.ID}} {{.CreatedAt}}' \
              | sort -k2 -r \
              | awk 'NR>3 {print $1}' \
              | xargs -r docker rmi 2>/dev/null || true
          REMOTE
